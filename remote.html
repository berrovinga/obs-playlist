<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Remote PRO</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; box-sizing: border-box; overflow-y: auto; padding-top: 50px; }
        #bg-blur { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; filter: blur(50px) brightness(0.2); z-index: 1; transition: 1s; }
        #content { position: relative; z-index: 10; width: 100%; display: flex; flex-direction: column; align-items: center; }
        #remote-cover { width: 180px; height: 180px; border-radius: 20px; background-size: cover; background-position: center; box-shadow: 0 20px 60px rgba(0,0,0,0.8); margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.15); transition: 0.5s; }
        #remote-title { font-size: 20px; font-weight: 800; margin: 0; text-align: center; max-width: 90%; }
        #remote-artist { font-size: 14px; opacity: 0.6; margin: 5px 0 25px 0; text-transform: uppercase; }
        .controls { display: grid; grid-template-columns: 1fr 1.2fr 1fr; gap: 15px; width: 90%; max-width: 400px; align-items: center; }
        button { background: rgba(255,255,255,0.1); border: none; color: white; border-radius: 15px; padding: 25px; font-size: 22px; cursor: pointer; transition: 0.2s; -webkit-tap-highlight-color: transparent; }
        button:active { transform: scale(0.9); background: rgba(255,255,255,0.2); }
        .btn-play { background: #ff0000; font-size: 35px; height: 100%; color: #000; }
        .btn-reset { grid-column: span 3; background: #333; font-size: 14px; padding: 15px; margin-top: 10px; letter-spacing: 2px; }
        /* EKSTRA ALT BOŞLUK */
        .spacer { height: 150px; width: 100%; }
    </style>
</head>
<body>
    <div id="bg-blur"></div>
    <div id="content">
        <div id="remote-cover"></div>
        <h2 id="remote-title">Yükleniyor...</h2>
        <p id="remote-artist">Offline</p>
        <div class="controls">
            <button onclick="sendCommand('prev')">⏮</button>
            <button class="btn-play" id="play-btn" onclick="sendCommand('toggle')">⏸</button>
            <button onclick="sendCommand('next')">⏭</button>
            <button class="btn-reset" onclick="sendCommand('reset')">LİSTEYİ BAŞA AL</button>
        </div>
        <!-- Kaydırma payı için boşluk -->
        <div class="spacer"></div>
    </div>
    <script>
        const WORKER_URL = "https://berrovinga-proxy.ytb6034.workers.dev";
        async function sync() {
            try {
                const res = await fetch(`${WORKER_URL}/sync`);
                const data = await res.json();
                if (data && data.sync) {
                    const s = data.sync;
                    document.getElementById('remote-title').innerText = s.title;
                    document.getElementById('remote-artist').innerText = s.artist;
                    document.getElementById('remote-cover').style.backgroundImage = `url(${s.cover})`;
                    document.getElementById('bg-blur').style.backgroundImage = `url(${s.cover})`;
                    document.getElementById('play-btn').innerText = s.playing ? '⏸' : '▶';
                }
            } catch(e) {}
        }
        setInterval(sync, 2000);
        async function sendCommand(a) { await fetch(`${WORKER_URL}/action`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ action: a }) }); }
    </script>
</body>
</html>

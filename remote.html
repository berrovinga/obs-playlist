<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Berrovinga Remote Proxy</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: 'Segoe UI', Roboto, sans-serif; display: flex; flex-direction: column; align-items: center; height: 100vh; box-sizing: border-box; overflow: hidden; }
        #bg-blur { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; filter: blur(50px) brightness(0.2); z-index: 1; transition: 1s; }
        #content { position: relative; z-index: 10; width: 100%; display: flex; flex-direction: column; align-items: center; flex-grow: 1; justify-content: center; }
        #remote-cover { width: 250px; height: 250px; border-radius: 25px; background-size: cover; background-position: center; box-shadow: 0 20px 60px rgba(0,0,0,0.8); margin-bottom: 40px; border: 1px solid rgba(255,255,255,0.15); transition: background-image 0.5s ease; }
        #remote-title { font-size: 24px; font-weight: 800; margin: 0; text-align: center; max-width: 90%; text-shadow: 0 4px 10px #000; }
        #remote-artist { font-size: 16px; opacity: 0.6; margin: 10px 0 50px 0; text-transform: uppercase; letter-spacing: 3px; font-weight: 700; }
        .controls { display: flex; align-items: center; gap: 40px; width: 100%; justify-content: center; margin-bottom: 60px; }
        button { background: rgba(255,255,255,0.08); border: none; color: white; border-radius: 50%; width: 75px; height: 75px; font-size: 26px; display: flex; align-items: center; justify-content: center; transition: 0.2s; -webkit-tap-highlight-color: transparent; }
        button:active { transform: scale(0.9); background: rgba(255,255,255,0.2); }
        .btn-play { width: 100px; height: 100px; background: #ff0000; font-size: 36px; box-shadow: 0 0 30px rgba(255,0,0,0.4); color: #000; }
        #status { font-size: 10px; opacity: 0.3; letter-spacing: 3px; }
    </style>
</head>
<body>
    <div id="bg-blur"></div>
    <div id="content">
        <div id="remote-cover"></div>
        <h2 id="remote-title">Bağlanıyor...</h2>
        <p id="remote-artist">Proxy Active</p>
        <div class="controls">
            <button onclick="sendCommand('prev')">⏮</button>
            <button class="btn-play" id="play-btn" onclick="sendCommand('toggle')">⏸</button>
            <button onclick="sendCommand('next')">⏭</button>
        </div>
        <div id="status">Secure Middle-Layer Connected</div>
    </div>

    <script>
        const WORKER_URL = "https://berrovinga-proxy.ytb6034.workers.dev";

        // Senkronu dinle
        async function sync() {
            try {
                const res = await fetch(`${WORKER_URL}/sync`);
                const data = await res.json();
                if (!data) return;
                document.getElementById('remote-title').innerText = data.title || "Yükleniyor...";
                document.getElementById('remote-artist').innerText = data.artist || "";
                document.getElementById('remote-cover').style.backgroundImage = `url(${data.cover})`;
                document.getElementById('bg-blur').style.backgroundImage = `url(${data.cover})`;
                document.getElementById('play-btn').innerText = data.playing ? '⏸' : '▶';
            } catch(e) {}
        }
        setInterval(sync, 2000);

        async function sendCommand(action) {
            await fetch(`${WORKER_URL}/action`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ action: action })
            });
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Remote PRO</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        #bg-blur { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; filter: blur(50px) brightness(0.2); z-index: 1; }
        
        #content { position: relative; z-index: 10; width: 95%; max-width: 350px; padding-top: 20px; display: flex; flex-direction: column; align-items: center; }

        .cover-container { position: relative; width: 100%; max-width: 300px; margin-bottom: 20px; }
        #remote-cover { width: 100%; aspect-ratio: 1/1; border-radius: 20px; background-size: cover; background-position: center; border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 10px 40px #000; }
        
        .overlay-btns { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; gap: 15px; background: rgba(0,0,0,0.2); border-radius: 20px; }
        
        button { background: rgba(255,255,255,0.2); border: 2px solid rgba(255,255,255,0.3); color: white; border-radius: 50%; width: 60px; height: 60px; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; -webkit-tap-highlight-color: transparent; }
        
        .btn-play { width: 80px; height: 80px; background: #ff0000; border: none; font-size: 30px; box-shadow: 0 0 20px rgba(255,0,0,0.5); color: white; }
        
        .btn-reset { position: absolute; bottom: 0; width: 100%; border-radius: 0 0 20px 20px; height: 45px; background: rgba(0,0,0,0.7); font-size: 11px; letter-spacing: 2px; border: none; font-weight: bold; }

        #remote-title { font-size: 22px; font-weight: 800; margin: 10px 0 0 0; text-align: center; text-shadow: 0 2px 10px #000; }
        #remote-artist { font-size: 14px; opacity: 0.7; margin: 5px 0 30px 0; text-transform: uppercase; color: #ff0000; font-weight: bold; }
        
        .spacer { height: 100px; }
    </style>
</head>
<body>
    <div id="bg-blur"></div>
    <div id="content">
        <div class="cover-container">
            <div id="remote-cover"></div>
            <div class="overlay-btns">
                <button onclick="sendCommand('prev')">⏮</button>
                <button class="btn-play" id="play-btn" onclick="sendCommand('toggle')">⏸</button>
                <button onclick="sendCommand('next')">⏭</button>
                <button class="btn-reset" onclick="sendCommand('reset')">LİSTEYİ BAŞA AL</button>
            </div>
        </div>

        <h2 id="remote-title">Yükleniyor...</h2>
        <p id="remote-artist">Berrovinga Music</p>
        
        <div class="spacer"></div>
    </div>

    <script>
        const WORKER_URL = "https://berrovinga-proxy.ytb6034.workers.dev";
        async function sync() {
            try {
                const res = await fetch(`${WORKER_URL}/sync`);
                const data = await res.json();
                if (data && data.sync) {
                    const s = data.sync;
                    document.getElementById('remote-title').innerText = s.title;
                    document.getElementById('remote-artist').innerText = s.artist;
                    document.getElementById('remote-cover').style.backgroundImage = "url('" + s.cover + "')";
                    document.getElementById('bg-blur').style.backgroundImage = "url('" + s.cover + "')";
                    document.getElementById('play-btn').innerText = s.playing ? '⏸' : '▶';
                }
            } catch(e) {}
        }
        setInterval(sync, 2000);
        async function sendCommand(a) { 
            await fetch(`${WORKER_URL}/action`, { 
                method: "POST", 
                headers: { "Content-Type": "application/json" }, 
                body: JSON.stringify({ action: a }) 
            }); 
        }
    </script>
</body>
</html>

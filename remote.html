<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Remote PRO</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; min-height: 100vh; overflow-y: auto; padding-top: 20px; }
        #bg-blur { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; filter: blur(50px) brightness(0.2); z-index: 1; }
        
        #content { position: relative; z-index: 10; width: 90%; max-width: 350px; display: flex; flex-direction: column; align-items: center; }

        .cover-wrapper { position: relative; width: 100%; aspect-ratio: 1/1; border-radius: 25px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
        #remote-cover { width: 100%; height: 100%; background-size: cover; background-position: center; transition: 0.5s; }
        
        .overlay-controls { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; gap: 20px; }
        
        button { background: rgba(255,255,255,0.15); border: none; color: white; border-radius: 50%; width: 65px; height: 65px; font-size: 22px; cursor: pointer; backdrop-filter: blur(10px); -webkit-tap-highlight-color: transparent; display: flex; align-items: center; justify-content: center; }
        button:active { transform: scale(0.9); background: rgba(255,255,255,0.3); }
        
        .btn-play { width: 85px; height: 85px; font-size: 30px; background: #ff0000; color: #000; box-shadow: 0 0 20px rgba(255,0,0,0.3); }
        
        .btn-reset { position: absolute; bottom: 0; width: 100%; border-radius: 0; height: 40px; background: rgba(0,0,0,0.6); font-size: 11px; letter-spacing: 2px; border: none; border-top: 1px solid rgba(255,255,255,0.1); }

        #remote-title { font-size: 20px; font-weight: 800; margin: 0; text-align: center; width: 100%; }
        #remote-artist { font-size: 14px; opacity: 0.6; margin: 5px 0 0 0; text-transform: uppercase; color: #ff0000; font-weight: bold; }
        
        .spacer { height: 100px; }
    </style>
</head>
<body>
    <div id="bg-blur"></div>
    <div id="content">
        <div class="cover-wrapper">
            <div id="remote-cover"></div>
            <div class="overlay-controls">
                <button onclick="sendCommand('prev')">⏮</button>
                <button class="btn-play" id="play-btn" onclick="sendCommand('toggle')">⏸</button>
                <button onclick="sendCommand('next')">⏭</button>
                <button class="btn-reset" onclick="sendCommand('reset')">LİSTEYİ BAŞA AL</button>
            </div>
        </div>

        <h2 id="remote-title">Yükleniyor...</h2>
        <p id="remote-artist">Offline</p>
        
        <div class="spacer"></div>
    </div>

    <script>
        const WORKER_URL = "https://berrovinga-proxy.ytb6034.workers.dev";
        async function sync() {
            try {
                const res = await fetch(`${WORKER_URL}/sync`);
                const data = await res.json();
                if (data && data.sync) {
                    const s = data.sync;
                    document.getElementById('remote-title').innerText = s.title;
                    document.getElementById('remote-artist').innerText = s.artist;
                    document.getElementById('remote-cover').style.backgroundImage = `url(${s.cover})`;
                    document.getElementById('bg-blur').style.backgroundImage = `url(${s.cover})`;
                    document.getElementById('play-btn').innerText = s.playing ? '⏸' : '▶';
                }
            } catch(e) {}
        }
        setInterval(sync, 2000);
        async function sendCommand(a) { await fetch(`${WORKER_URL}/action`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ action: a }) }); }
    </script>
</body>
</html>
